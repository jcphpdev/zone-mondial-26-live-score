<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zone Mondial 26 — Live Scores</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="scoreboard" aria-live="polite">
    <div class="scene-ambient" aria-hidden="true"></div>

    <header class="match-header">
      <span id="competition">COUPE DU MONDE 2026</span>
      <span class="live-badge"><i></i><span id="status">EN DIRECT</span></span>
    </header>

    <section class="team-panel team-home">
      <img id="homeFlag" class="flag" alt="">
      <h1 id="homeName">Maroc</h1>
    </section>

    <section class="score-panel">
      <div id="score" class="score">
        <span id="homeScore">0</span>
        <span class="score-separator">–</span>
        <span id="awayScore">0</span>
      </div>
      <div id="minute" class="minute">EN DIRECT</div>
    </section>

    <section class="team-panel team-away">
      <img id="awayFlag" class="flag" alt="">
      <h1 id="awayName">Écosse</h1>
    </section>

    <section id="standingsView" class="standings-view">
      <div class="standings-title">
        <span id="groupName">GROUPE A</span>
        <small id="groupSubtitle">COUPE DU MONDE 2026</small>
      </div>
      <div class="standings-table">
        <div class="standings-head">
          <span>#</span><span>Équipe</span><span>J</span><span>G</span>
          <span>N</span><span>P</span><span>BP</span><span>BC</span>
          <span>+/-</span><span>Pts</span>
        </div>
        <div id="standingsRows"></div>
      </div>
    </section>

    <section id="liveUpdatesView" class="live-updates-view">
      <div class="live-updates-title">
        <span>LIVE UPDATES</span>
        <small>Zone Mondial 26</small>
      </div>
      <div id="liveUpdatesRows" class="live-updates-rows"></div>
    </section>

    <footer class="match-footer">
      <p id="matchInfo">Chargement des informations du match…</p>
      <div id="pagination" class="pagination" aria-hidden="true"></div>
    </footer>

    <aside class="ticker" aria-label="Actualités des matchs">
      <div class="ticker__label">LIVE UPDATE</div>
      <div class="ticker__viewport">
        <div id="tickerTrack" class="ticker__track">
          <span>Chargement des matchs publiés…</span>
        </div>
      </div>
    </aside>

    <img class="official-logo" src="logo.png" alt="Zone Mondial 26">

    <aside id="goalAlert" class="goal-alert" aria-live="assertive" aria-hidden="true">
      <div class="goal-alert__flare"></div>
      <div class="goal-alert__label">BUT</div>
      <div class="goal-alert__content">
        <span id="goalTeam" class="goal-alert__team">Équipe</span>
        <span id="goalScoreLine" class="goal-alert__score">0 - 0</span>
      </div>
    </aside>

    <button id="soundUnlock" class="sound-unlock" type="button" hidden>
      Activer le son
    </button>
  </main>

  <div id="connectionState" class="connection-state" hidden>
    Mise à jour des scores…
  </div>

  <script type="module" src="script.js?v=20260626-9"></script>
</body>
</html>
